---
# Usage:
#   ansible-playbook system-info_pb.yml --limit <HOSTS>
- name: System info
  hosts: all

  tasks:
    - name: Display system information
      ansible.builtin.debug:
        msg:
          - "=== {{ ansible_hostname }} ==="
          - ""
          - "Date: {{ ansible_date_time.date }} ({{ ansible_date_time.tz }})"
          - ""
          - "--- Network ---"
          - "Interfaces: {{ ansible_interfaces | join(', ') }}"
          - "IP addresses: {{ ansible_all_ipv4_addresses | join(', ') }}"
          - "Gateway: {{ ansible_default_ipv4.gateway | default('N/A') }}"
          - ""
          - "--- OS & Kernel ---"
          - "Distribution: {{ ansible_distribution }} {{ ansible_distribution_version }} ({{ ansible_distribution_release }})"
          - "Kernel: {{ ansible_kernel }}"
          - "Architecture: {{ ansible_architecture }}"
          - ""
          - "--- Hardware ---"
          - "CPU: {{ ansible_processor[2] | default(ansible_processor[1] | default('Unknown')) }}"
          - "Cores: {{ ansible_processor_cores }}"
          - "RAM: {{ ansible_memtotal_mb }} MB"
          - "Swap: {{ ansible_memory_mb.swap.total }} MB"
