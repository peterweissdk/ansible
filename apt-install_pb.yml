---
# Usage:
#   ansible-playbook apt-install_pb.yml --limit <HOSTS> --extra-vars="packages=['pkg1','pkg2']"
# Or for a single package:
#   ansible-playbook apt-install_pb.yml --limit <HOSTS> --extra-vars="packages=pkg1"
# Optional: state=present|absent|latest (default: present)
- name: Install package(s) on server(s)
  become: true
  hosts: all

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - packages is defined
        fail_msg: "Required variable 'packages' must be defined"
        quiet: true

  tasks:
    - name: Manage packages
      ansible.builtin.apt:
        name: "{{ packages }}"
        state: "{{ state | default('present') }}"
        update_cache: true
        cache_valid_time: 3600
