---
# Usage:
#   ansible-playbook service-restart_pb.yml --limit <HOSTS> -e "service=<SERVICE>"
# Optional: daemon_reload=true to reload systemd (default: false)
- name: Restart service on server(s)
  hosts: all
  become: true

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - service is defined
        fail_msg: "Required variable 'service' must be defined"
        quiet: true

  tasks:
    - name: Restart {{ service }}
      ansible.builtin.systemd:
        name: "{{ service }}"
        state: restarted
        daemon_reload: "{{ daemon_reload | default(false) }}"
