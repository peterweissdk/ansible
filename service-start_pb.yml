---
# Usage:
#   ansible-playbook service-start_pb.yml --limit <HOSTS> -e "service=<SERVICE>"
# Optional: enabled=true to enable on boot (default: true)
- name: Start service on server(s)
  hosts: all
  become: true

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - service is defined
        fail_msg: "Required variable 'service' must be defined"
        quiet: true

  tasks:
    - name: Start {{ service }}
      ansible.builtin.systemd:
        name: "{{ service }}"
        state: started
        enabled: "{{ enabled | default(true) }}"
