---
# Usage:
#   ansible-playbook service-stop_pb.yml --limit <HOSTS> -e "service=<SERVICE>"
# Optional: disabled=true to disable on boot (default: false)
- name: Stop service on server(s)
  hosts: all
  become: true

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - service is defined
        fail_msg: "Required variable 'service' must be defined"
        quiet: true

  tasks:
    - name: Stop {{ service }}
      ansible.builtin.systemd:
        name: "{{ service }}"
        state: stopped
        enabled: "{{ not (disabled | default(false) | bool) }}"
